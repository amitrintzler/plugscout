name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: Compatibility (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: compatibility
    env:
      TOOLKIT_HOME: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate whitelist + policy
        run: npm run whitelist:verify

      - name: Ensure sync reproducibility (advisory on PR)
        shell: bash
        run: |
          set -euo pipefail
          SYNC_TODAY=$(node -e 'const fs=require("fs");const p="data/catalog/items.json";if(!fs.existsSync(p)){console.log(new Date().toISOString().slice(0,10));process.exit(0)};const items=JSON.parse(fs.readFileSync(p,"utf8"));const latest=items.map(i=>i.lastSeenAt).filter(Boolean).sort().at(-1);console.log(latest||new Date().toISOString().slice(0,10));')
          SKILLS_MCPS_SYNC_OFFLINE=1 SKILLS_MCPS_SYNC_TODAY="$SYNC_TODAY" npm run sync
          if git diff --quiet -- data/catalog/items.json data/catalog/skills.json data/catalog/mcps.json; then
            echo "Offline sync reproducibility check passed."
          else
            git diff --stat -- data/catalog/items.json data/catalog/skills.json data/catalog/mcps.json
            echo "::warning::Offline sync reproducibility drift detected (advisory)."
          fi

      - name: Workflow summary
        run: |
          {
            echo "## CI Summary"
            echo "- Lint/Test/Build: passed on Node 18 and 20"
            echo "- Policy verification: passed"
            echo "- Offline sync reproducibility: checked (advisory on PRs)"
          } >> "$GITHUB_STEP_SUMMARY"

  release-readiness:
    name: Release Readiness (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate package version is semver
        run: |
          node -e 'const v=require("./package.json").version; if(!/^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$/.test(v)){console.error(`Invalid semver version: ${v}`); process.exit(1)}; console.log(`Valid semver version: ${v}`)'

      - name: Conventional commit style check (warning only)
        shell: bash
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}..HEAD"
            git fetch origin "${{ github.base_ref }}" --depth=200
          else
            if git rev-parse --verify HEAD~20 >/dev/null 2>&1; then
              RANGE="HEAD~20..HEAD"
            else
              RANGE="HEAD~1..HEAD"
            fi
          fi

          BAD=$(git log --pretty=format:'%s' $RANGE | grep -Ev '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+' || true)
          if [ -n "$BAD" ]; then
            echo "::warning::Non-conventional commit messages detected (advisory)."
            echo "$BAD"
          fi

      - name: Workflow summary
        run: |
          {
            echo "## Release Readiness (Advisory)"
            echo "- Semver validation: checked"
            echo "- Conventional commit style: warning-only"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} not yet published — will publish."
          fi

      - name: Publish
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.already_published == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/commits/main) for details." \
            --latest

      - name: Workflow summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          {
            echo "## Publish"
            if [ "${{ steps.check.outputs.already_published }}" = "true" ]; then
              echo "- Version ${VERSION} already published — skipped"
            else
              echo "- Published v${VERSION} to npm"
              echo "- Created GitHub release v${VERSION}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
