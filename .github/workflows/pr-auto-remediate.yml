name: PR Auto Remediate

on:
  workflow_run:
    workflows:
      - CI
      - Security / CodeQL
      - Security / Dependency Review
      - Security / SBOM + Trivy
      - Security / Secrets
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-remediate-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  auto-remediate:
    name: Auto Remediate Failed PR Checks
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Resolve PR context
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (!prs.length) {
              core.setOutput('skip', 'true');
              core.setOutput('reason', 'No PR attached to failed workflow run.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = prs[0].number;
            const prResp = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const pr = prResp.data;
            const sameRepo = pr.head.repo.full_name === `${owner}/${repo}`;

            core.setOutput('skip', sameRepo ? 'false' : 'true');
            core.setOutput('reason', sameRepo ? '' : 'PR head is in fork; auto-push disabled.');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);

      - name: Skip remediation for unsupported PR context
        if: steps.pr.outputs.skip == 'true'
        run: echo "${{ steps.pr.outputs.reason }}"

      - name: Checkout PR branch
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          repository: ${{ github.repository }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.pr.outputs.skip != 'true'
        run: npm ci

      - name: Apply safe remediation rules from failed logs + agent comments
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/pr-failure-autoheal.mjs \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --pr "${{ steps.pr.outputs.pr_number }}" \
            --summary ".toolkit/autoheal-summary.json"

      - name: Detect patch changes
        if: steps.pr.outputs.skip != 'true'
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --name-only
          fi

      - name: Zero-impact gate
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        run: node scripts/verify-zero-impact.mjs

      - name: Validate remediated branch
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Commit and push remediation patch
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ci): auto-remediate failed checks"
          git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

      - name: Upsert remediation status comment
        if: always() && steps.pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-auto-remediate -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const run = context.payload.workflow_run;
            const hasChanges = '${{ steps.diff.outputs.has_changes }}' === 'true';
            const skipped = '${{ steps.pr.outputs.skip }}' === 'true';

            let summary = {
              matchedRules: [],
              changedFiles: [],
              agentCommentsReviewed: [],
              notes: ['No summary file produced.']
            };
            if (fs.existsSync('.toolkit/autoheal-summary.json')) {
              summary = JSON.parse(fs.readFileSync('.toolkit/autoheal-summary.json', 'utf8'));
            }

            const lines = [
              marker,
              'Automatic PR remediation report',
              '',
              `- Triggered by: ${run.name}`,
              `- Failed run: ${run.html_url}`,
              `- Rules matched: ${summary.matchedRules.length ? summary.matchedRules.join(', ') : 'none'}`,
              `- Agent comments reviewed: ${summary.agentCommentsReviewed?.length ?? 0}`,
              `- Patch applied: ${hasChanges ? 'yes' : 'no'}`,
              `- Context skipped: ${skipped ? 'yes' : 'no'}`,
              ''
            ];

            if (Array.isArray(summary.changedFiles) && summary.changedFiles.length) {
              lines.push('Changed files:');
              summary.changedFiles.forEach((file) => lines.push(`- \`${file}\``));
              lines.push('');
              lines.push('Validation: `npm run lint`, `npm run test`, `npm run build`');
            }

            if (Array.isArray(summary.notes) && summary.notes.length) {
              lines.push('');
              lines.push('Notes:');
              summary.notes.forEach((note) => lines.push(`- ${note}`));
            }

            const body = lines.join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
